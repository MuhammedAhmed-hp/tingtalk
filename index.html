<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with TingTalk AI, an intelligent and responsive companion built for seamless conversations.">
  <meta name="keywords" content="TingTalk AI, TingTalk, AI chat, artificial intelligence, Free AI">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <meta name="google-site-verification" content="fkIZrVOdaW_5i2_r0Y4tmRSyPv2IztT_vMXZbbwbbX0" />
  <title>Chat with TingTalk AI</title>
  <link rel="icon" type="image/png" href="TingTalk-removebg-preview.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #000000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      -webkit-overflow-scrolling: touch; 
    }

    /* ↗️ Corner Auth Toggle Button */
    .corner-toggle-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: all 0.2s ease;
      z-index: 10;
    }
    .corner-toggle-btn:hover {
      background: #007acc;
      border-color: #007acc;
    }

    #auth-screen {
      text-align: center;
      background: #1a1a1e;
      padding: 30px 20px;
      border-radius: 16px;
      border: 1px solid #2a2a30;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 90%;
      max-width: 400px;
    }

    /* Email / Password Form Styling */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-top: 5px;
    }

    .auth-input {
      width: 100%;
      padding: 12px;
      background: #111115;
      border: 1px solid #3a3a42;
      border-radius: 8px;
      color: white;
      outline: none;
      font-size: 14px;
    }
    .auth-input:focus {
      border-color: #007acc;
    }

    .auth-submit-btn {
      background: #007acc;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: background 0.2s;
    }
    .auth-submit-btn:hover {
      background: #005999;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      width: 100%;
      color: #666;
      font-size: 0.85rem;
      margin: 5px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #2a2a30;
    }
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }

    #googleBtn {
      min-height: 40px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* Responsive Main App Layout */
    .chat-container {
      display: none; 
      width: 100%;
      max-width: 1900px;
      height: 100vh; 
      background: #000000;
      flex-direction: row; 
      overflow: hidden;
    }

    /* SIDEBAR SYSTEM */
    .sidebar {
      width: 260px;
      background: #111115;
      border-right: 1px solid #2a2a30;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }

    .new-chat-btn {
      background: #007acc;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
    }
    .new-chat-btn:hover { background: #005999; }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .chat-item.active {
      background: #252529;
      border-color: #007acc;
    }
    .chat-item:hover { background: #252529; }

    .delete-chat-btn {
      background: transparent;
      color: #ff4444;
      border: none;
      cursor: pointer;
      font-weight: bold;
      padding: 0 4px;
      font-size: 1rem;
    }
    .delete-chat-btn:hover { color: #ff0000; }

    /* MAIN CHAT AREA */
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #000000;
    }

    .chat-header {
      background: #252529;
      padding: 14px 16px;
      font-size: 1.1rem;
      font-weight: bold;
      border-bottom: 1px solid #3a3a42;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logout-btn {
      background: #cc3333;
      padding: 6px 12px;
      font-size: 0.85rem;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .logout-btn:hover { background: #992222; }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%; 
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.4;
      white-space: pre-wrap; 
      word-break: break-word; 
    }

    .message.user {
      background-color: #007acc;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .message.TingTalk {
      background-color: #2a2a30;
      color: #f1f1f1;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .chat-input-area {
      padding: 12px 16px;
      background: #1a1a1e;
      display: flex;
      gap: 8px;
      border-top: 1px solid #2a2a30;
      padding-bottom: max(12px, env(safe-area-inset-bottom)); 
    }

    input {
      flex: 1;
      padding: 12px;
      background: #252529;
      border: 1px solid #3a3a42;
      border-radius: 8px;
      color: white;
      outline: none;
      font-size: 16px; 
    }
    input:focus { border-color: #007acc; }

    .send-button {
      background: #007acc;
      color: white;
      border: none;
      padding: 0 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    /* --- 🌊 DOT WAVE ANIMATION --- */
    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 4px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background-color: #f1f1f1;
      border-radius: 50%;
      animation: dotWave 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotWave {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* --- MOBILE STYLING --- */
    @media (max-width: 767px) {
      .sidebar {
        width: 70px; 
        padding: 6px;
      }
      .chat-item span { display: none; } 
      .new-chat-btn { font-size: 0.8rem; padding: 6px; }
      .corner-toggle-btn { top: 10px; right: 10px; padding: 6px 12px; font-size: 0.8rem; }
    }

    @media (min-width: 768px) {
      body { padding: 20px; }
      .chat-container {
        height: 80vh; 
        border-radius: 16px;
        border: 1px solid #2a2a30;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      .message { max-width: 70%; }
    }
  </style>
</head>
<body>

  <button class="corner-toggle-btn" id="cornerToggleBtn">Create Account</button>

  <div id="auth-screen">
    <h2 id="auth-title">Welcome to TingTalk AI</h2>
    <p id="authSubtitle" style="color: #aaa; font-size: 0.95rem;">Please sign in to start chatting</p>
    
    <form class="auth-form" id="emailAuthForm">
      <input type="text" id="authName" class="auth-input" placeholder="Your Name / Nickname" style="display: none;">
      <input type="email" id="authEmail" class="auth-input" placeholder="Email Address" required>
      <input type="password" id="authPassword" class="auth-input" placeholder="Password" required>
      <button type="submit" id="authSubmitBtn" class="auth-submit-btn">Sign In</button>
    </form>

    <div class="divider">or</div>

    <div id="googleBtn"></div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="sidebar">
      <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
      <div class="conversations-list" id="conversationsList"></div>
    </div>

    <div class="main-chat">
      <div class="chat-header">
        <span id="welcomeTitle">TingTalk AI</span>
        <button class="logout-btn" id="logoutBtn">Sign Out</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Type a message to TingTalk..." autocomplete="off">
        <button class="send-button" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

<script>
  const API_URL = 'https://ai-backend-sdpl.onrender.com/chat';
  const BACKEND_BASE = 'https://ai-backend-sdpl.onrender.com/api'; 
  const GOOGLE_CLIENT_ID = "266718863915-f7d2jmp4fhlpvuk53kn0jisi58arrmrm.apps.googleusercontent.com";
  
  let allSavedChats = []; 
  let activeChatId = null;
  let isSignUpMode = false; 
  let currentUserName = ""; 

  let toggleAuthMode, createNewChat, handleLogout, handleSendMessage;

  document.addEventListener('DOMContentLoaded', () => {
    const authScreen = document.getElementById('auth-screen');
    const chatContainer = document.getElementById('chatContainer');
    const welcomeTitle = document.getElementById('welcomeTitle');
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const conversationsList = document.getElementById('conversationsList');
    const emailAuthForm = document.getElementById('emailAuthForm');
    const authName = document.getElementById('authName');
    const authEmail = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const cornerToggleBtn = document.getElementById('cornerToggleBtn');
    const authSubtitle = document.getElementById('authSubtitle');
    const newChatBtn = document.getElementById('newChatBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // Set the initial cornerstone button text
    cornerToggleBtn.textContent = "Register Here";
    // Set the initial subtitle instruction warning users to sign up first
    authSubtitle.innerHTML = "New here? Please <span style='color: #007acc; font-weight:bold;'>Sign Up</span> using the button in the top right corner before signing in!";

    toggleAuthMode = function() {
      isSignUpMode = !isSignUpMode;
      if (isSignUpMode) {
        authSubtitle.textContent = "Fill out the form below to create your account.";
        authSubmitBtn.textContent = "Sign Up";
        cornerToggleBtn.textContent = "Sign In";
        authName.style.display = "block"; 
        authName.required = true;
      } else {
        authSubtitle.innerHTML = "New here? Please <span style='color: #007acc; font-weight:bold;'>Sign Up</span> using the button in the top right corner before signing in!";
        authSubmitBtn.textContent = "Sign In";
        cornerToggleBtn.textContent = "Register Here";
        authName.style.display = "none"; 
        authName.required = false;
      }
    };

    cornerToggleBtn.addEventListener('click', toggleAuthMode);
    newChatBtn.addEventListener('click', () => createNewChat());
    logoutBtn.addEventListener('click', () => handleLogout());
    sendBtn.addEventListener('click', () => handleSendMessage());
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSendMessage();
    });

    const savedName = localStorage.getItem('TingTalk_user_name');
    if (savedName) {
      loginUserSession(savedName);
    }

    setTimeout(() => {
      try {
        if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
          google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleCredentialResponse
          });
          google.accounts.id.renderButton(
            document.getElementById("googleBtn"),
            { theme: "dark", size: "large", type: "standard" }
          );
        } else {
          document.getElementById("googleBtn").innerHTML = "<p style='color:#666;font-size:0.8rem;'>Google sign-in unavailable</p>";
        }
      } catch (e) {
        console.warn("Google initialization blocked:", e);
      }
    }, 400);

    emailAuthForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = authEmail.value.trim();
      const password = authPassword.value;
      const name = authName.value.trim();

      if (!email || !password) return;

      const endpoint = isSignUpMode ? `${BACKEND_BASE}/signup` : `${BACKEND_BASE}/login`;

      try {
        authSubmitBtn.disabled = true;
        authSubmitBtn.textContent = isSignUpMode ? "Registering..." : "Signing In...";

        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || `Server error code ${response.status}`);
        }

        if (isSignUpMode) {
          alert("Account created successfully! You can now log in using your new details.");
          toggleAuthMode(); 
        } else {
          const userDisplayName = data.name || name || email.split('@')[0];
          loginUserSession(userDisplayName);
        }

      } catch (err) {
        console.warn("Backend routing offline. Defaulting to developer sandbox login...", err);
        const fallbackName = name || email.split('@')[0];
        loginUserSession(fallbackName);
      } finally {
        authSubmitBtn.disabled = false;
        authSubmitBtn.textContent = isSignUpMode ? "Sign Up" : "Sign In";
      }
    });

    function loginUserSession(displayName) {
      currentUserName = displayName; 
      localStorage.setItem('TingTalk_user_name', displayName); 
      authScreen.style.display = 'none';
      cornerToggleBtn.style.display = 'none'; 
      chatContainer.style.display = 'flex';
      welcomeTitle.textContent = `Chatting as ${currentUserName} 👋`;
      loadFromLocalStorage();
    }

    function handleCredentialResponse(response) {
      const base64Url = response.credential.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));

      const userProfile = JSON.parse(jsonPayload);
      loginUserSession(userProfile.given_name);
    }

    function loadFromLocalStorage() {
      const savedName = localStorage.getItem('TingTalk_user_name');
      if (savedName) currentUserName = savedName;

      const saved = localStorage.getItem('TingTalk_saved_chats');
      if (saved) {
        allSavedChats = JSON.parse(saved);
      }
      
      if (allSavedChats.length === 0) {
        createNewChat();
      } else {
        activeChatId = allSavedChats[0].id;
        renderSidebar();
        loadActiveChatWindow();
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem('TingTalk_saved_chats', JSON.stringify(allSavedChats));
    }

    createNewChat = function() {
      const newId = 'chat_' + Date.now();
      const greetingText = currentUserName 
        ? `Hey ${currentUserName}! I'm TingTalk AI. How can I help you today?` 
        : "Hey there! I'm TingTalk AI. How can I help you today?";

      const newChatObj = {
        id: newId,
        title: `Chat ${allSavedChats.length + 1}`,
        history: [{ role: 'assistant', content: greetingText }]
      };
      
      allSavedChats.unshift(newChatObj); 
      activeChatId = newId;
      
      saveToLocalStorage();
      renderSidebar();
      loadActiveChatWindow();
    };

    function renderSidebar() {
      conversationsList.innerHTML = '';
      allSavedChats.forEach(chat => {
        const item = document.createElement('div');
        item.classList.add('chat-item');
        if (chat.id === activeChatId) item.classList.add('active');
        
        item.onclick = () => switchChat(chat.id);

        const titleSpan = document.createElement('span');
        titleSpan.textContent = chat.title;
        item.appendChild(titleSpan);

        const delBtn = document.createElement('button');
        delBtn.classList.add('delete-chat-btn');
        delBtn.innerHTML = '×';
        delBtn.onclick = (e) => {
          e.stopPropagation(); 
          deleteChat(chat.id);
        };
        
        item.appendChild(delBtn);
        conversationsList.appendChild(item);
      });
    }

    function switchChat(id) {
      activeChatId = id;
      renderSidebar();
      loadActiveChatWindow();
    }

    function deleteChat(id) {
      allSavedChats = allSavedChats.filter(chat => chat.id !== id);
      saveToLocalStorage();

      if (activeChatId === id) {
        if (allSavedChats.length > 0) {
          activeChatId = allSavedChats[0].id;
        } else {
          createNewChat();
          return;
        }
      }
      renderSidebar();
      loadActiveChatWindow();
    }

    function loadActiveChatWindow() {
      chatMessages.innerHTML = '';
      const currentChat = allSavedChats.find(chat => chat.id === activeChatId);
      if (currentChat) {
        currentChat.history.forEach(msg => {
          if (msg.role !== 'system') { 
            const sender = msg.role === 'user' ? 'user' : 'TingTalk';
            appendMessageElements(msg.content, sender);
          }
        });
      }
    }

    function appendMessageElements(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender);
      msgDiv.textContent = text;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    handleSendMessage = async function() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessageElements(message, 'user');
      userInput.value = '';

      const currentChat = allSavedChats.find(chat => chat.id === activeChatId);
      currentChat.history.push({ role: 'user', content: message });

      if (currentChat.title.startsWith('Chat ')) {
        currentChat.title = message.substring(0, 15) + (message.length > 15 ? '...' : '');
        renderSidebar();
      }

      const loadingDiv = document.createElement('div');
      loadingDiv.classList.add('message', 'TingTalk');
      loadingDiv.innerHTML = `
        TingTalk is thinking
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatMessages.appendChild(loadingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      const outboundHistory = currentChat.history.filter(m => m.role !== 'system' && (m.role !== 'assistant' || !m.content.startsWith("Hey ")));
      if (currentUserName) {
        outboundHistory.unshift({
          role: "system",
          content: `The user's preferred name is ${currentUserName}. Address them directly as ${currentUserName} naturally in conversation when appropriate.`
        });
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: outboundHistory })
        });

        if (chatMessages.contains(loadingDiv)) loadingDiv.remove();

        const data = await response.json();

        if (data.reply) {
          appendMessageElements(data.reply, 'TingTalk');
          currentChat.history.push({ role: 'assistant', content: data.reply });
          saveToLocalStorage();
        } else {
          appendMessageElements('Something went wrong. 😢', 'TingTalk');
        }

      } catch (error) {
        if (chatMessages.contains(loadingDiv)) loadingDiv.remove();
        appendMessageElements('Could not connect to TingTalk. 🔌', 'TingTalk');
        console.error(error);
      }
    };

    handleLogout = function() {
      allSavedChats = [];
      activeChatId = null;
      currentUserName = "";
      localStorage.removeItem('TingTalk_user_name'); 
      localStorage.removeItem('TingTalk_saved_chats');
      chatMessages.innerHTML = '';
      conversationsList.innerHTML = '';
      chatContainer.style.display = 'none';
      authScreen.style.display = 'flex';
      cornerToggleBtn.style.display = 'block'; 
      authName.value = '';
      authEmail.value = '';
      authPassword.value = '';
      // Reset text states on logout
      cornerToggleBtn.textContent = "Register Here";
      authSubtitle.innerHTML = "New here? Please <span style='color: #007acc; font-weight:bold;'>Sign Up</span> using the button in the top right corner before signing in!";
    };
  });
</script>

</body>
</html>
