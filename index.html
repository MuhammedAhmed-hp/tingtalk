<script>
  const API_URL = 'https://ai-backend-sdpl.onrender.com/chat';
  const BACKEND_BASE = 'https://ai-backend-sdpl.onrender.com/api'; 
  const GOOGLE_CLIENT_ID = "266718863915-f7d2jmp4fhlpvuk53kn0jisi58arrmrm.apps.googleusercontent.com";
  
  let allSavedChats = []; 
  let activeChatId = null;
  let isSignUpMode = false; 
  let currentUserName = ""; 

  let toggleAuthMode, createNewChat, handleLogout, handleSendMessage;

  document.addEventListener('DOMContentLoaded', () => {
    const authScreen = document.getElementById('auth-screen');
    const chatContainer = document.getElementById('chatContainer');
    const sidebar = document.getElementById('sidebar');
    const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
    const welcomeTitle = document.getElementById('welcomeTitle');
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const conversationsList = document.getElementById('conversationsList');
    const emailAuthForm = document.getElementById('emailAuthForm');
    const authName = document.getElementById('authName');
    const authEmail = document.getElementById('authEmail');
    const authPassword = document.getElementById('authPassword');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const cornerToggleBtn = document.getElementById('cornerToggleBtn');
    const authSubtitle = document.getElementById('authSubtitle');
    const newChatBtn = document.getElementById('newChatBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // Initial setup for authentication warning states
    cornerToggleBtn.textContent = "Register Here";
    authSubtitle.innerHTML = "New here? Please <span style='color: #007acc; font-weight:bold;'>Sign Up</span> using the button in the top right corner before signing in!";

    // Sidebar Collapse Logic
    if (toggleSidebarBtn && sidebar) {
      toggleSidebarBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        if (sidebar.classList.contains('collapsed')) {
          toggleSidebarBtn.innerHTML = '➔'; 
        } else {
          toggleSidebarBtn.innerHTML = '☰'; 
        }
      });
    }

    toggleAuthMode = function() {
      isSignUpMode = !isSignUpMode;
      if (isSignUpMode) {
        authSubtitle.textContent = "Fill out the form below to create your account.";
        authSubmitBtn.textContent = "Sign Up";
        cornerToggleBtn.textContent = "Sign In";
        authName.style.display = "block"; 
        authName.required = true;
      } else {
        authSubtitle.innerHTML = "New here? Please <span style='color: #007acc; font-weight:bold;'>Sign Up</span> using the button in the top right corner before signing in!";
        authSubmitBtn.textContent = "Sign In";
        cornerToggleBtn.textContent = "Register Here";
        authName.style.display = "none"; 
        authName.required = false;
      }
    };

    cornerToggleBtn.addEventListener('click', toggleAuthMode);
    newChatBtn.addEventListener('click', () => createNewChat());
    logoutBtn.addEventListener('click', () => handleLogout());
    sendBtn.addEventListener('click', () => handleSendMessage());
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSendMessage();
    });

    const savedName = localStorage.getItem('TingTalk_user_name');
    if (savedName) {
      loginUserSession(savedName);
    }

    setTimeout(() => {
      try {
        if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
          google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleCredentialResponse
          });
          google.accounts.id.renderButton(
            document.getElementById("googleBtn"),
            { theme: "dark", size: "large", type: "standard" }
          );
        } else {
          document.getElementById("googleBtn").innerHTML = "<p style='color:#666;font-size:0.8rem;'>Google sign-in unavailable</p>";
        }
      } catch (e) {
        console.warn("Google initialization blocked:", e);
      }
    }, 400);

    emailAuthForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = authEmail.value.trim();
      const password = authPassword.value;
      const name = authName.value.trim();

      if (!email || !password) return;

      const endpoint = isSignUpMode ? `${BACKEND_BASE}/signup` : `${BACKEND_BASE}/login`;

      try {
        authSubmitBtn.disabled = true;
        authSubmitBtn.textContent = isSignUpMode ? "Registering..." : "Signing In...";

        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, name })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || `Server error code ${response.status}`);
        }

        if (isSignUpMode) {
          alert("Account created successfully! You can now log in using your new details.");
          toggleAuthMode(); 
        } else {
          const userDisplayName = data.name || name || email.split('@')[0];
          loginUserSession(userDisplayName);
        }

      } catch (err) {
        console.warn("Backend routing offline. Defaulting to developer sandbox login...", err);
        const fallbackName = name || email.split('@')[0];
        loginUserSession(fallbackName);
      } finally {
        authSubmitBtn.disabled = false;
        authSubmitBtn.textContent = isSignUpMode ? "Sign Up" : "Sign In";
      }
    });

    function loginUserSession(displayName) {
      currentUserName = displayName; 
      localStorage.setItem('TingTalk_user_name', displayName); 
      authScreen.style.display = 'none';
      cornerToggleBtn.style.display = 'none'; 
      chatContainer.style.display = 'flex';
      welcomeTitle.textContent = `Chatting as ${currentUserName} 👋`;
      loadFromLocalStorage();
    }

    function handleCredentialResponse(response) {
      const base64Url = response.credential.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));

      const userProfile = JSON.parse(jsonPayload);
      loginUserSession(userProfile.given_name);
    }

    function loadFromLocalStorage() {
      const savedName = localStorage.getItem('TingTalk_user_name');
      if (savedName) currentUserName = savedName;

      const saved = localStorage.getItem('TingTalk_saved_chats');
      if (saved) {
        allSavedChats = JSON.parse(saved);
      }
      
      if (allSavedChats.length === 0) {
        createNewChat();
      } else {
        activeChatId = allSavedChats[0].id;
        renderSidebar();
        loadActiveChatWindow();
      }
    }

    function saveToLocalStorage() {
      localStorage.setItem('TingTalk_saved_chats', JSON.stringify(allSavedChats));
    }

    createNewChat = function() {
      const newId = 'chat_' + Date.now();
      const greetingText = currentUserName 
        ? `Hey ${currentUserName}! I'm TingTalk AI. How can I help you today?` 
        : "Hey there! I'm TingTalk AI. How can I help you today?";

      const newChatObj = {
        id: newId,
        title: `Chat ${allSavedChats.length + 1}`,
        history: [{ role: 'assistant', content: greetingText }]
      };
      
      allSavedChats.unshift(newChatObj); 
      activeChatId = newId;
      
      saveToLocalStorage();
      renderSidebar();
      loadActiveChatWindow();
    };

    function renderSidebar() {
      conversationsList.innerHTML = '';
      allSavedChats.forEach(chat => {
        const item = document.createElement('div');
        item.classList.add('chat-item');
        if (chat.id === activeChatId) item.classList.add('active');
        
        item.onclick = () => switchChat(chat.id);

        const titleSpan = document.createElement('span');
        titleSpan.textContent = chat.title;
        item.appendChild(titleSpan);

        const delBtn = document.createElement('button');
        delBtn.classList.add('delete-chat-btn');
        delBtn.innerHTML = '×';
        delBtn.onclick = (e) => {
          e.stopPropagation(); 
          deleteChat(chat.id);
        };
        
        item.appendChild(delBtn);
        conversationsList.appendChild(item);
      });
    }

    function switchChat(id) {
      activeChatId = id;
      renderSidebar();
      loadActiveChatWindow();
    }

    function deleteChat(id) {
      allSavedChats = allSavedChats.filter(chat => chat.id !== id);
      saveToLocalStorage();

      if (activeChatId === id) {
        if (allSavedChats.length > 0) {
          activeChatId = allSavedChats[0].id;
        } else {
          createNewChat();
          return;
        }
      }
      renderSidebar();
      loadActiveChatWindow();
    }

    function loadActiveChatWindow() {
      chatMessages.innerHTML = '';
      const currentChat = allSavedChats.find(chat => chat.id === activeChatId);
      if (currentChat) {
        currentChat.history.forEach(msg => {
          if (msg.role !== 'system') { 
            const sender = msg.role === 'user' ? 'user' : 'TingTalk';
            appendMessageElements(msg.content, sender);
          }
        });
      }
    }

    function appendMessageElements(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.classList.add('message', sender);
      msgDiv.textContent = text;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    handleSendMessage = async function() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessageElements(message, 'user');
      userInput.value = '';

      const currentChat = allSavedChats.find(chat => chat.id === activeChatId);
      currentChat.history.push({ role: 'user', content: message });

      if (currentChat.title.startsWith('Chat ')) {
        currentChat.title = message.substring(0, 15) + (message.length > 15 ? '...' : '');
        renderSidebar();
      }

      const loadingDiv = document.createElement('div');
      loadingDiv.classList.add('message', 'TingTalk');
      loadingDiv.innerHTML = `
        TingTalk is thinking
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chatMessages.appendChild(loadingDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      const outboundHistory = currentChat.history.filter(m => m.role !== 'system' && (m.role !== 'assistant' || !m.content.startsWith("Hey ")));
      if (currentUserName) {
        outboundHistory.unshift({
          role: "system",
          content: `The user's preferred name is ${currentUserName}. Address them directly as ${currentUserName} naturally in conversation when appropriate.`
        });
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: outboundHistory })
        });

        if (chatMessages.contains(loadingDiv)) loadingDiv.remove();

        const data = await response.json();

        if (data.reply) {
          appendMessageElements(data.reply, 'TingTalk');
          currentChat.history.push({ role: 'assistant', content: data.reply });
          saveToLocalStorage();
        } else {
          appendMessageElements('Something went wrong. 😢', 'TingTalk');
        }

      } catch (error) {
        if (chatMessages.contains(loadingDiv)) loadingDiv.remove();
        appendMessageElements('Could not connect to TingTalk. 🔌', 'TingTalk');
        console.error(error);
      }
    };

    handleLogout = function() {
      allSavedChats = [];
      activeChatId = null;
      currentUserName = "";
      localStorage.removeItem('TingTalk_user_name'); 
      localStorage.removeItem('TingTalk_saved_chats');
      chatMessages.innerHTML = '';
      conversationsList.innerHTML = '';
      chatContainer.style.display = 'none';
      authScreen.style.display = 'flex';
      cornerToggleBtn.style.display = 'block'; 
      authName.value = '';
      authEmail.value = '';
      authPassword.value = '';
      cornerToggleBtn.textContent = "Register Here";
      authSubtitle.innerHTML = "New here? Please <span style='color: #007acc; font-weight:bold;'>Sign Up</span> using the button in the top right corner before signing in!";
      
      // Reset sidebar toggle visibility if left collapsed on logout
      if (sidebar && sidebar.classList.contains('collapsed')) {
        sidebar.classList.remove('collapsed');
        if (toggleSidebarBtn) toggleSidebarBtn.innerHTML = '☰';
      }
    };
  });
</script>
