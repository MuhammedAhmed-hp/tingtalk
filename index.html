<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with TingTalk AI</title>
  <link rel="icon" type="image/png" href="TingTalk AI Logo.png">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #000000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      -webkit-overflow-scrolling: touch; 
    }

    /* ↗️ Corner Auth Toggle Button */
    .corner-toggle-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: all 0.2s ease;
      z-index: 10;
    }
    .corner-toggle-btn:hover {
      background: #007acc;
      border-color: #007acc;
    }

    #auth-screen {
      text-align: center;
      background: #1a1a1e;
      padding: 30px 20px;
      border-radius: 16px;
      border: 1px solid #2a2a30;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 90%;
      max-width: 400px;
    }

    /* Email / Password Form Styling */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-top: 5px;
    }

    .auth-input {
      width: 100%;
      padding: 12px;
      background: #111115;
      border: 1px solid #3a3a42;
      border-radius: 8px;
      color: white;
      outline: none;
      font-size: 14px;
    }
    .auth-input:focus {
      border-color: #007acc;
    }

    .auth-submit-btn {
      background: #007acc;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: background 0.2s;
    }
    .auth-submit-btn:hover {
      background: #005999;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      width: 100%;
      color: #666;
      font-size: 0.85rem;
      margin: 5px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #2a2a30;
    }
    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }

    /* Responsive Main App Layout */
    .chat-container {
      display: none; 
      width: 100%;
      max-width: 1800px;
      height: 100vh; 
      background: #000000;
      flex-direction: row; 
      overflow: hidden;
    }

    /* SIDEBAR SYSTEM */
    .sidebar {
      width: 260px;
      background: #111115;
      border-right: 1px solid #2a2a30;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }

    .new-chat-btn {
      background: #007acc;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
    }
    .new-chat-btn:hover { background: #005999; }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: #1a1a1e;
      border: 1px solid #2a2a30;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .chat-item.active {
      background: #252529;
      border-color: #007acc;
    }
    .chat-item:hover { background: #252529; }

    .delete-chat-btn {
      background: transparent;
      color: #ff4444;
      border: none;
      cursor: pointer;
      font-weight: bold;
      padding: 0 4px;
      font-size: 1rem;
    }
    .delete-chat-btn:hover { color: #ff0000; }
